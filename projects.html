<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Projects from the QUANTOS Research Team">
  <meta name="keywords" content="QUANTOS, projects, quantum imaging, optical computing, spectral imaging, paraxial fluids of light">
  <meta name="author" content="QUANTOS Research Team">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Projects | QUANTOS Research Team</title>

  <!-- Favicon -->
  <link rel="icon" href="img/icon.svg" type="image/svg+xml">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Font Awesome, needed for the moon/sun icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap">
</head>

<body>
  <div id="header-placeholder"></div>

  <main>
    <section class="projects-page-hero">
      <div class="container">
        <h1>Projects</h1>
        <p>
          Explore the ongoing and past projects developed across the QUANTOS research lines.
        </p>
      </div>
    </section>

    <section class="projects-page-section">
      <div class="container">
        <div class="projects-filters-panel">
          <div class="projects-filter-group">
            <h2>Research line</h2>

            <div class="projects-filter-buttons" id="projects-lab-filters">
              <button class="projects-filter-btn active" type="button" data-lab-filter="all">
                All
              </button>

              <button class="projects-filter-btn" type="button" data-lab-filter="quantum_imaging">
                Quantum Imaging
              </button>

              <button class="projects-filter-btn" type="button" data-lab-filter="optical_computing">
                Optical Computing
              </button>

              <button class="projects-filter-btn" type="button" data-lab-filter="paraxial_fluids">
                Paraxial Fluids of Light
              </button>

              <button class="projects-filter-btn" type="button" data-lab-filter="spectral_imaging">
                Spectral Imaging
              </button>
            </div>
          </div>

          <div class="projects-filter-group">
            <h2>Status</h2>

            <div class="projects-filter-buttons" id="projects-status-filters">
              <button class="projects-filter-btn active" type="button" data-status-filter="all">
                All
              </button>

              <button class="projects-filter-btn" type="button" data-status-filter="ongoing">
                Ongoing
              </button>

              <button class="projects-filter-btn" type="button" data-status-filter="finished">
                Finished
              </button>
            </div>
          </div>
        </div>

        <div class="projects-page-results-header">
          <h2>All Projects</h2>
          <p id="projects-results-count"></p>
        </div>

        <div id="all-projects-container" class="all-projects-grid">
          <p>Loading projects...</p>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/script.js"></script>
</body>
</html>
